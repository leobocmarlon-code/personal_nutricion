<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRICIÓN - CRXIX ÁNCASH</title>
    <style>
        /* Estilos Generales - Aspecto Limpio, Guinda e Institucional */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f2eb; /* Fondo Beige del uniforme */
            color: #222;
            line-height: 1.6;
        }

        header {
            background-color: #721c24; /* Color Guinda principal */
            color: #f5f2eb; /* Texto en beige clarito */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        header img {
            height: 90px; /* Tamaño del logo optimizado */
            width: auto;
            margin-right: 20px;
            vertical-align: middle;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 2px solid #f5f2eb; /* Borde beige sutil al logo */
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Sistema de Pestañas (Barra Guinda Oscuro) */
        nav {
            background-color: #4a1016; /* Guinda más oscuro para contraste */
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav button {
            background: transparent;
            border: none;
            color: #e3c4c6; /* Guinda clarito/pastel para letras inactivas */
            padding: 1.2rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        nav button:hover, nav button.active {
            color: #ffffff;
            background-color: #721c24; /* Cambia al guinda encendido */
            border-bottom: 3px solid #f5f2eb; /* Línea de acento beige */
        }
